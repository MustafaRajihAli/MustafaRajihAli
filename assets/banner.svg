<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Mustafa Rajih Ali Al-Ajwadi Command Center Banner">
    <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#000004"/>
                  <stop offset="45%" stop-color="#04081f"/>
                  <stop offset="100%" stop-color="#0a0e27"/>
          </linearGradient>
          <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#00e5ff"/>
                  <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
          <radialGradient id="glow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
                  <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
          </radialGradient>
          <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2.2" result="b"/>
                  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
    </defs>

    <rect width="1200" height="320" fill="url(#bg)"/>

    <!-- STARFIELD -->
    <g fill="#ffffff">
          <circle cx="80" cy="60" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
          <circle cx="240" cy="120" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/></circle>
          <circle cx="420" cy="40" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
          <circle cx="640" cy="90" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
          <circle cx="880" cy="50" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
          <circle cx="1050" cy="110" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="3.3s" repeatCount="indefinite"/></circle>
          <circle cx="160" cy="250" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
          <circle cx="520" cy="270" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/></circle>
          <circle cx="980" cy="260" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
          <circle cx="740" cy="230" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="3.8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- ORBITING PLANET / NODE -->
    <g transform="translate(1010,160)">
          <circle r="70" fill="none" stroke="#00e5ff" stroke-opacity="0.25" stroke-dasharray="4 6"/>
          <circle r="120" fill="url(#glow)"/>
          <circle r="34" fill="#0a0e27" stroke="url(#cyan)" stroke-width="2"/>
          <circle r="34" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.6"/>
          <g>
                  <circle cx="70" cy="0" r="5" fill="#00e5ff" filter="url(#soft)"/>
                  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
          </g>
          <g>
                  <circle cx="0" cy="70" r="3.5" fill="#7c3aed" filter="url(#soft)"/>
                  <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="11s" repeatCount="indefinite"/>
          </g>
    </g>

    <!-- HUD FRAME -->
    <rect x="20" y="20" width="1160" height="280" fill="none" stroke="url(#cyan)" stroke-width="1.5" rx="10" stroke-opacity="0.7"/>
    <path d="M20 60 L20 30 Q20 20 30 20 L70 20" fill="none" stroke="#00e5ff" stroke-width="3"/>
    <path d="M1180 260 L1180 290 Q1180 300 1170 300 L1130 300" fill="none" stroke="#7c3aed" stroke-width="3"/>

    <!-- TEXT -->
    <text x="70" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="46" font-weight="800" fill="#ffffff" filter="url(#soft)">MUSTAFA RAJIH ALI AL-AJWADI</text>
    <text x="72" y="165" font-family="'Segoe UI',Arial,sans-serif" font-size="24" font-weight="600" fill="#00e5ff">AI ENGINEER // CYBERSECURITY SPECIALIST</text>
    <text x="72" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="500" fill="#9aa4c7">FOUNDER OF NOVUS AI DYNAMICS</text>

    <!-- SCAN LINE -->
    <rect x="70" y="220" width="0" height="2" fill="url(#cyan)">
          <animate attributeName="width" values="0;520;0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="245" font-family="'Courier New',monospace" font-size="13" fill="#00e5ff" opacity="0.8">&gt; SYSTEM ONLINE &#183; INTELLIGENCE NETWORK ACTIVE &#183; ROBOTICS &#183; UAV &#183; OSINT</text>
</svg>
